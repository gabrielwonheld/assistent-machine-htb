<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>32Bits Corp - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 px-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-warning" href="#">
                <i class="bi bi-cpu-fill me-2"></i>32Bits Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/list-clients"><i class="bi bi-people-fill me-1"></i> Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/product"><i class="bi bi-box-seam me-1"></i> Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/seles"><i class="bi bi-cart-check me-1"></i> Sales</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-light btn-sm border-0" onclick="toggleTheme()" title="Toggle Theme">
                        <i class="bi bi-moon-stars-fill"></i>
                    </button>

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
                            id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="bg-warning text-dark rounded-circle d-flex justify-content-center align-items-center fw-bold me-2"
                                style="width: 32px; height: 32px;">
                                U
                            </div>
                            <span>User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i> Profile</a>
                            </li>
                            <li><a class="dropdown-item" href="/admin"><i class="bi bi-shield-lock me-2"></i> Admin
                                    Panel</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="/logout"><i
                                        class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check local storage or system preference
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            let nextTheme = 'light';
            if (current !== 'dark') {
                nextTheme = 'dark';
            }

            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
        }
    </script>
</body>

</html>
