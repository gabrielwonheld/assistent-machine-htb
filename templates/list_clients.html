{% extends "layout.html" %}
{% block content %}

<h2>Clients</h2>
<br>

<div>
    <button type="button" class="btn btn-secondary" onclick="abrirModalCriar()">Register New Client</button>
</div>
<label for="buscador">Search Client:</label>
<input type="text" id="buscador" class="form-control" placeholder="Type client name..." onkeyup="filtrarTabela()">
<br><br>
<table class="table table-striped table-dark">
    <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Phone</th>
            <th scope="col">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% if clients %}
        {% for client in clients %}
        <tr>
            <td>{{ client.id }}</td>
            <td>{{ client.name }}</td>
            <td>{{ client.phone }}</td>
            <td class="dropdown-action" style="position: relative;">
                <button class="btn btn-sm btn-primary"
                    onclick="abrirModalEditar('{{ client.id }}', '{{ client.name }}', '{{ client.phone }}')">
                    Edit
                </button>
                <button class="btn btn-sm btn-danger" onclick="excluirCliente('{{ client.id }}')">
                    Delete
                </button>
            </td>
        </tr>
        {% endfor %}
        {% else %}
        <tr>
            <td colspan="4" class="text-center">No clients found.</td>
        </tr>
        {% endif %}
    </tbody>
</table>

<!-- Modal Criar -->
<div id="clienteModalCriar" class="modal-overlay" style="display:none;">
    <div class="modal-container">
        <span class="close" onclick="fecharModal('clienteModalCriar')">&times;</span>
        <h3>Register New Client</h3>
        <form id="formCriarCliente">
            <label>Name:</label>
            <input class="form-field" type="text" name="name" id="nomeCriar" required>

            <label>Phone:</label>
            <input class="form-field" type="text" name="phone" id="telefoneCriar" placeholder="(00) 00000-0000"
                required>

            <input type="submit" value="Save Client" class="submit-btn btn btn-success">
        </form>
    </div>
</div>

<!-- Modal Editar -->
<div id="clienteModalEditar" class="modal-overlay" style="display:none;">
    <div class="modal-container">
        <span class="close" onclick="fecharModal('clienteModalEditar')">&times;</span>
        <h3>Edit Client</h3>
        <form id="formEditarCliente">
            <input type="hidden" id="idEditar">

            <label>Name:</label>
            <input class="form-field" type="text" name="name" id="nomeEditar" required>

            <label>Phone:</label>
            <input class="form-field" type="text" name="phone" id="telefoneEditar" required>

            <input type="submit" value="Update Client" class="submit-btn btn btn-primary">
        </form>
    </div>
</div>

<script>
    function abrirModalCriar() {
        document.getElementById('clienteModalCriar').style.display = 'flex';
    }

    function abrirModalEditar(id, name, phone) {
        document.getElementById('idEditar').value = id;
        document.getElementById('nomeEditar').value = name;
        document.getElementById('telefoneEditar').value = phone;
        document.getElementById('clienteModalEditar').style.display = 'flex';
    }

    function fecharModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function excluirCliente(clienteId) {
        if (!confirm('Are you sure you want to delete this client?')) return;

        fetch(`/clients/${clienteId}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(res => {
                if (res.ok) {
                    alert("Client deleted successfully!");
                    location.reload();
                } else {
                    return res.json().then(data => {
                        alert(data.message || "Error deleting client.");
                    });
                }
            })
            .catch(() => {
                alert("Error communicating with server.");
            });
    }

    function filtrarTabela() {
        const input = document.getElementById("buscador");
        const filter = input.value.toUpperCase();
        const table = document.querySelector("table");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td")[1]; // Column 1 is Name
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }

    document.getElementById('formCriarCliente').addEventListener('submit', async function (e) {
        e.preventDefault();
        const data = {
            name: document.getElementById('nomeCriar').value,
            phone: document.getElementById('telefoneCriar').value
        };

        try {
            const response = await fetch('/clients', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Client created!");
                location.reload();
            } else {
                const result = await response.json();
                alert(result.message || "Error creating client");
            }
        } catch (error) {
            console.error(error);
            alert("Connection error");
        }
    });

    document.getElementById('formEditarCliente').addEventListener('submit', async function (e) {
        e.preventDefault();
        const id = document.getElementById('idEditar').value;
        const data = {
            name: document.getElementById('nomeEditar').value,
            phone: document.getElementById('telefoneEditar').value
        };

        try {
            const response = await fetch(`/clients/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Client updated!");
                location.reload();
            } else {
                const result = await response.json();
                alert(result.message || "Error updating client");
            }
        } catch (error) {
            console.error(error);
            alert("Connection error");
        }
    });

    // Fecha modal ao clicar fora
    window.onclick = function (event) {
        if (event.target.classList.contains('modal-overlay')) {
            event.target.style.display = "none";
        }
    }
</script>

<style>
    /* Basic modal styles replicated from list_produtos.html */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-container {
        background: #333;
        padding: 20px;
        border-radius: 8px;
        width: 400px;
        color: white;
    }

    .close {
        float: right;
        cursor: pointer;
        font-size: 1.5rem;
    }

    .form-field {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        background: #555;
        border: 1px solid #777;
        color: white;
    }

    .submit-btn {
        width: 100%;
        padding: 10px;
        background: #28a745;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>

{% endblock %}
