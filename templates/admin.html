{% extends "layout.html" %}
{% block content %}
<div class="card border-danger p-4">
    <h3 class="text-danger">Painel de Controle de Fábrica</h3>
    <p>Upload de Ficha Técnica de Produtos (Apenas Admin)</p>
    
    <div class="alert alert-info bg-dark text-info border-info">
        <strong>Atenção:</strong> Arquivos permitidos: .pdf, .docx, .txt
    </div>

    <form id="uploadForm">
        <div class="mb-3">
            <input type="file" name="file" id="fileInput" class="form-control bg-dark text-white">
        </div>
        <button type="submit" class="btn btn-danger">Subir Ficha Técnica</button>
    </form>
    <div id="status" class="mt-3"></div>
</div>

<script>
document.getElementById('uploadForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData();
    formData.append('file', document.getElementById('fileInput').files[0]);

    const res = await fetch('/admin/upload-spec', {
        method: 'POST',
        body: formData // Note que para arquivos não usamos JSON stringify
    });
    const data = await res.json();
    document.getElementById('status').innerHTML = `<p class="text-success">${data.message}</p><p>Caminho: ${data.path}</p>`;
};
</script>
{% endblock %}
