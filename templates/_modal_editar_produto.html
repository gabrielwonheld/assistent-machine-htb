<div id="produtoModalEditar" class="modal-overlay" style="display:none;">
    <div class="modal-container">
        <div class="modal-header">
            <h3>Edit Product</h3>
            <span class="close" onclick="fecharModal('produtoModalEditar')">&times;</span>
        </div>
        <form id="formEditarProduto" class="modal-body">
            <input type="hidden" name="id" id="edit_produto_id">

            <label>Name:</label>
            <input class="form-field" type="text" name="name" id="edit_nome" required>

            <label>Unit Price:</label>
            <input class="form-field campo-preco" type="text" name="price" id="precoEditar" placeholder="$ 0.00"
                required>

            <label>Technical Data Sheet:</label>
            <input class="form-field" type="file" name="fic_tec" id="fic_tecEditar" required>

            <input type="submit" value="Update Product" class="submit-btn">
        </form>
    </div>
</div>

<script>
    document.getElementById('formEditarProduto').addEventListener('submit', async function (e) {
        e.preventDefault();

        const id = document.getElementById('edit_produto_id').value;
        const name = document.getElementById('edit_nome').value;
        const price = document.getElementById('precoEditar').value;
        const ficTecInput = document.getElementById('fic_tecEditar');

        let bodyPayload;
        let headers = {};

        if (ficTecInput.files.length > 0) {
            const formData = new FormData();
            formData.append('name', name);
            formData.append('price', price);
            formData.append('file', ficTecInput.files[0]);
            bodyPayload = formData;
        } else {
            bodyPayload = JSON.stringify({ name, price, fic_tec: "" });
            headers['Content-Type'] = 'application/json';
        }

        try {
            const response = await fetch(`/product/${id}`, {
                method: 'PUT',
                headers: headers,
                body: bodyPayload
            });

            if (response.ok) {
                alert("Product updated!");
                location.reload();
            } else {
                alert("Error updating");
            }
        } catch (error) {
            console.error(error);
            alert("Connection error");
        }
    });

    function fecharModal(id) {
        document.getElementById(id).style.display = 'none';
    }
</script>
