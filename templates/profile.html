{% extends "layout.html" %}
{% block content %}
<div class="p-4">
    <h3>My Profile</h3>
    <hr>
    <div id="userData">
    </div>

    <h4 class="mt-4">Edit Information</h4>
    <div class="row g-3">
        <div class="col-md-6">
            <label>New Username</label>
            <input type="text" id="new_user" class="form-control bg-dark text-white">
            <label>New Password</label>
            <input type="password" id="new_password" class="form-control bg-dark text-white">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" class="form-control bg-dark text-white">
            <label>Profile Image</label>
            <input type="file" accept=".jpg, .jpeg, .png" onchange="previewImage()" id="image_profile"
                class="form-control bg-dark text-white">
        </div>
        <div class="col-12">
            <button onclick="updateProfile()" class="btn btn-primary">Save Changes</button>
        </div>
    </div>
</div>

<script>
    function previewImage() {
        const file = document.getElementById('image_profile').files[0];
        const reader = new FileReader();
        reader.onloadend = function () {
            document.getElementById('image_profile').src = reader.result;
        }
        reader.readAsDataURL(file);
    }

    async function loadProfile() {
        const res = await fetch('/update-profile');
        const data = await res.json();
        document.getElementById('userData').innerHTML = `
        <p><strong>User:</strong> ${data.username}</p>
        <p><strong>Profile Image:</strong> <img src="${data.image_profile}" alt="Profile" style="max-width:200px;"></p>
    `;
    }

    async function updateProfile() {
        const formData = new FormData();
        formData.append('username', document.getElementById('new_user').value);
        formData.append('password', document.getElementById('new_password').value);
        formData.append('confirm_password', document.getElementById('confirm_password').value);

        const imageFile = document.getElementById('image_profile').files[0];
        if (imageFile) {
            formData.append('image_profile', imageFile);
        }

        const res = await fetch('/update-profile', {
            method: 'POST',
            body: formData
        });

        if (res.ok) { alert("Profile Updated!"); loadProfile(); }
        // else { alert("Error updating profile!"); }
        else {
            const error = await res.json();
            alert(error.error);
        }
    }
    loadProfile();
</script>
{% endblock %}
